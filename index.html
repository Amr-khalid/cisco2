<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Learnova Jump - Offline Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            touch-action: none;
            overflow: hidden;
            background: #000000;
        }
        #gameCanvas {
            box-shadow: 0 0 50px rgba(255, 255, 255, 0.05);
            max-width: 100%;
            height: 100%;
            background: #050505;
            transition: box-shadow 1s ease;
            border-radius: 12px;
        }
        .game-container {
            width: 100%;
            max-width: 600px; /* شاشة أكبر للشاشات الكبيرة ولكن محكومة */
            height: 85vh;
            position: relative;
        }
        .metallic-text {
            background: linear-gradient(to bottom, #ffffff 0%, #a1a1aa 50%, #3f3f46 51%, #e4e4e7 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));
        }
        .phase-shift {
            animation: flash 1s ease-out;
        }
        @keyframes flash {
            0% { background-color: rgba(255, 255, 255, 0.9); }
            100% { background-color: transparent; }
        }
        @keyframes pulse-text {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }
        .level-up-anim {
            animation: pulse-text 2s ease-in-out forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <!-- واجهة المستخدم العلوية -->
    <div id="ui-header" class="fixed top-0 w-full max-w-2xl flex justify-between items-center p-4 z-20 text-white transition-colors duration-1000">
        <div class="flex items-center gap-2 bg-black/70 backdrop-blur px-4 py-2 rounded-full border border-gray-700">
            <div id="status-dot" class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
            <span class="text-sm font-bold text-gray-300" id="status-text">أنت غير متصل</span>
        </div>
        <div class="text-right bg-black/50 backdrop-blur px-4 py-1 rounded-2xl border border-gray-800">
            <div id="score" class="text-4xl lg:text-5xl font-black metallic-text">0</div>
            <div class="text-xs text-gray-500 uppercase font-bold tracking-widest mt-1">أفضل نتيجة: <span id="highScore" class="text-gray-300">0</span></div>
        </div>
    </div>

    <!-- رسالة تغيير المرحلة -->
    <div id="level-up-msg" class="fixed top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl font-black opacity-0 z-40 pointer-events-none text-center whitespace-nowrap drop-shadow-[0_0_20px_rgba(255,255,255,0.5)]">
    </div>

    <!-- حاوية اللعبة -->
    <div class="game-container flex justify-center mt-16 lg:mt-0">
        <div id="flash-overlay" class="absolute inset-0 pointer-events-none z-10 rounded-xl"></div>
        <canvas id="gameCanvas" class="w-full"></canvas>

        <!-- شاشة البداية -->
        <div id="start-screen" class="absolute inset-0 bg-black/95 flex flex-col items-center justify-center p-8 text-center z-30 transition-all border border-gray-800 rounded-xl">
            <div class="mb-6 relative">
                <div class="absolute -inset-4 bg-gray-500/20 blur-xl rounded-full"></div>
                <svg class="w-24 h-24 text-gray-300 relative" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-5xl font-black mb-2 text-white tracking-tight">Learnova <span class="metallic-text">Jump</span></h1>
            <p class="text-gray-400 mb-8 text-base leading-relaxed max-w-xs mx-auto">تحدّى الجاذبية عبر 4 مراحل مختلفة.<br>اكسر رقمك القياسي الآن.</p>
            <button id="start-btn" class="w-full max-w-sm bg-gradient-to-b from-gray-200 to-gray-400 hover:from-white hover:to-gray-300 text-black py-4 rounded-xl font-black text-xl shadow-[0_0_30px_rgba(255,255,255,0.15)] transition-all active:scale-95 border-b-4 border-gray-500">
                ابدأ التحدي
            </button>
            <div class="mt-8 text-xs text-gray-600 flex gap-6 font-bold bg-gray-900 px-6 py-3 rounded-full">
                <span>⌨️ الأسهم للتحرك</span>
                <span>📱 أو المس الشاشة</span>
            </div>
        </div>

        <!-- شاشة الخسارة -->
        <div id="gameover-screen" class="absolute inset-0 bg-black/90 backdrop-blur-md hidden flex flex-col items-center justify-center p-8 text-center z-30 border border-red-900/50 rounded-xl">
            <h2 class="text-2xl font-bold text-gray-400 mb-2">سقطت في الهاوية!</h2>
            <div id="final-score" class="text-8xl font-black metallic-text mb-8">0</div>
            
            <div id="phase-reached" class="mb-8 text-lg font-bold text-white px-4 py-2 rounded-lg bg-white/10 border border-white/20">
                وصلت إلى: المرحلة الأولى
            </div>

            <button id="retry-btn" class="w-full max-w-sm bg-gradient-to-b from-gray-700 to-gray-900 text-white px-10 py-5 rounded-xl font-black text-xl shadow-2xl hover:from-gray-600 hover:to-gray-800 transition-all active:scale-95 flex justify-center items-center gap-3 border border-gray-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                المحاولة مجدداً
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const levelUpMsg = document.getElementById('level-up-msg');
        const flashOverlay = document.getElementById('flash-overlay');
        const phaseReachedEl = document.getElementById('phase-reached');

        const PHASE_MILESTONES = {
            2: 50,
            3: 250,
            4: 500
        };

        const PHASE_NAMES = {
            1: "المرحلة الأولى (الكلاسيكية)",
            2: "المرحلة الثانية (الخطر)",
            3: "المرحلة الثالثة (النيون)",
            4: "المرحلة الرابعة (الفراغ)"
        };

        let config = {
            gravity: 0.35,      
            jumpForce: -10.5,   
            platformWidth: 110,
            platformHeight: 16,
            playerSize: 42,
            initialPlatforms: 8,
            gameSpeed: 0.8
        };

        let state = {
            gameRunning: false,
            score: 0,
            highScore: localStorage.getItem('learnova_jump_best_v3') || 0,
            phase: 1,
            player: {},
            platforms: [],
            cameraY: 0,
            keys: {}
        };

        highScoreEl.innerText = state.highScore;

        function resizeCanvas() {
            const container = document.querySelector('.game-container');
            // حجم معقول ومتناسب مع الشاشات
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }

        window.addEventListener('resize', resizeCanvas);

        function initGame() {
            resizeCanvas();

            state.score = 0;
            state.phase = 1;
            state.cameraY = 0;
            state.gameRunning = true;
            
            // إعادة تعيين إعدادات الفيزياء للمرحلة الأولى
            config.gravity = 0.35;
            config.gameSpeed = 0.8;
            config.platformWidth = Math.min(120, canvas.width * 0.25);
            config.jumpForce = -10.5;
            
            scoreEl.innerText = '0';
            
            state.player = {
                x: canvas.width / 2 - config.playerSize / 2,
                y: canvas.height - 180,
                vx: 0,
                vy: 0,
                width: config.playerSize,
                height: config.playerSize
            };

            state.platforms = [];
            state.platforms.push({
                x: state.player.x - 40,
                y: state.player.y + 60,
                width: 160,
                height: config.platformHeight,
                type: 'static'
            });

            for (let i = 1; i < config.initialPlatforms; i++) {
                addPlatform(canvas.height - i * 140);
            }

            startScreen.classList.add('hidden');
            gameoverScreen.classList.add('hidden');
            
            // تهيئة الخلفية
            canvas.style.boxShadow = "0 0 50px rgba(255, 255, 255, 0.05)";
            
            requestAnimationFrame(gameLoop);
        }

        function addPlatform(y) {
            let movingProb = 0;
            let widthMultiplier = 1;
            let baseSpeed = 0;

            // هندسة الصعوبة حسب المرحلة
            switch(state.phase) {
                case 1: movingProb = 0.15; widthMultiplier = 1.0; baseSpeed = 2; break;
                case 2: movingProb = 0.40; widthMultiplier = 0.8; baseSpeed = 4; break;
                case 3: movingProb = 0.70; widthMultiplier = 0.6; baseSpeed = 6; break;
                case 4: movingProb = 0.90; widthMultiplier = 0.4; baseSpeed = 8; break;
            }

            const type = Math.random() < movingProb ? 'moving' : 'static';
            
            // تقليل الحجم تدريجياً مع السكور داخل نفس المرحلة أيضاً
            let width = Math.max(
                (config.platformWidth * widthMultiplier) - ((state.score % 500) / 40), 
                canvas.width * 0.1 // لا يقل عن 10% من الشاشة
            );

            state.platforms.push({
                x: Math.random() * (canvas.width - width),
                y: y,
                width: width,
                height: config.platformHeight,
                type: type,
                speed: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 2 + baseSpeed),
                visited: false
            });
        }

        function triggerPhase(newPhase) {
            state.phase = newPhase;
            
            let message = "";
            let msgColor = "";

            if (newPhase === 2) {
                config.gameSpeed = 1.5; 
                config.gravity = 0.45; 
                config.jumpForce = -12.5;
                message = "مرحلة الخطر! 🔥";
                msgColor = "text-red-500";
                canvas.style.boxShadow = "0 0 50px rgba(239, 68, 68, 0.2)";
            } 
            else if (newPhase === 3) {
                config.gameSpeed = 2.5; 
                config.gravity = 0.55; 
                config.jumpForce = -14;
                message = "مرحلة النيون! ⚡";
                msgColor = "text-cyan-400";
                canvas.style.boxShadow = "0 0 50px rgba(34, 211, 238, 0.3)";
            }
            else if (newPhase === 4) {
                config.gameSpeed = 4.0; 
                config.gravity = 0.7; 
                config.jumpForce = -16;
                message = "الفراغ المظلم! 🕳️";
                msgColor = "text-purple-500";
                canvas.style.boxShadow = "0 0 50px rgba(168, 85, 247, 0.4)";
            }
            
            // تأثير بصري للتحول
            flashOverlay.classList.remove('phase-shift');
            void flashOverlay.offsetWidth; // Trigger reflow
            flashOverlay.classList.add('phase-shift');
            
            levelUpMsg.innerText = message;
            levelUpMsg.className = `fixed top-1/4 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl md:text-6xl font-black z-40 pointer-events-none text-center whitespace-nowrap drop-shadow-[0_0_20px_rgba(255,255,255,0.5)] level-up-anim ${msgColor}`;
            
            setTimeout(() => {
                levelUpMsg.classList.remove('level-up-anim');
                levelUpMsg.style.opacity = '0';
            }, 2000);
        }

        function update() {
            if (!state.gameRunning) return;

            const p = state.player;

            // سرعة حركة اللاعب الجانبية تزيد مع حجم الشاشة لضمان الوصول
            const lateralSpeed = canvas.width * 0.02;

            if (state.keys['ArrowLeft'] || state.keys['KeyA']) p.vx = -lateralSpeed;
            else if (state.keys['ArrowRight'] || state.keys['KeyD']) p.vx = lateralSpeed;
            else p.vx *= 0.85; // انزلاق تدريجي

            p.vy += config.gravity;
            p.x += p.vx;
            p.y += p.vy;

            // التفاف الشاشة (يخرج من اليمين يظهر من اليسار)
            if (p.x + p.width < 0) p.x = canvas.width;
            if (p.x > canvas.width) p.x = -p.width;

            // نظام الاصطدام
            if (p.vy > 0) {
                state.platforms.forEach(plat => {
                    if (p.x < plat.x + plat.width && 
                        p.x + p.width > plat.x && 
                        p.y + p.height > plat.y && 
                        p.y + p.height < plat.y + plat.height + p.vy) {
                        
                        p.vy = config.jumpForce;
                        p.y = plat.y - p.height;

                        if (!plat.visited) {
                            plat.visited = true;
                            state.score += 10;
                            scoreEl.innerText = state.score;
                            
                            // فحص التقدم في المراحل
                            if (state.score === PHASE_MILESTONES[2] && state.phase === 1) triggerPhase(2);
                            if (state.score === PHASE_MILESTONES[3] && state.phase === 2) triggerPhase(3);
                            if (state.score === PHASE_MILESTONES[4] && state.phase === 3) triggerPhase(4);
                        }
                    }
                });
            }

            // تحريك الكاميرا للأعلى
            const threshold = canvas.height / 2.2;
            if (p.y < threshold) {
                let diff = threshold - p.y;
                p.y = threshold;
                state.platforms.forEach(plat => plat.y += diff);
            }

            // حركة المنصات ونزولها التلقائي
            state.platforms.forEach(plat => {
                plat.y += config.gameSpeed;
                if (plat.type === 'moving') {
                    plat.x += plat.speed;
                    if (plat.x < 0 || plat.x + plat.width > canvas.width) plat.speed *= -1;
                }
            });

            // تنظيف المنصات وتوليد جديدة
            state.platforms = state.platforms.filter(plat => plat.y < canvas.height);
            while (state.platforms.length < config.initialPlatforms) {
                const minY = Math.min(...state.platforms.map(pl => pl.y));
                addPlatform(minY - 140);
            }

            if (p.y > canvas.height) {
                endGame();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // الخلفية تتغير حسب المرحلة
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            if (state.phase === 1) {
                gradient.addColorStop(0, '#111111');
                gradient.addColorStop(1, '#000000');
            } else if (state.phase === 2) {
                gradient.addColorStop(0, '#3f0000');
                gradient.addColorStop(1, '#050000');
            } else if (state.phase === 3) {
                gradient.addColorStop(0, '#083344'); // لون سيان داكن
                gradient.addColorStop(1, '#020617');
            } else {
                gradient.addColorStop(0, '#2e1065'); // بنفسجي مظلم
                gradient.addColorStop(1, '#000000');
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // رسم المنصات
            state.platforms.forEach(plat => {
                if (state.phase === 1) {
                    // المرحلة 1: فضي كلاسيكي
                    const platGrad = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y + plat.height);
                    platGrad.addColorStop(0, '#ffffff'); 
                    platGrad.addColorStop(0.3, '#d4d4d8');
                    platGrad.addColorStop(1, '#52525b');
                    ctx.shadowBlur = plat.type === 'moving' ? 15 : 0;
                    ctx.shadowColor = '#ffffff';
                    ctx.fillStyle = platGrad;
                    ctx.beginPath();
                    ctx.roundRect(plat.x, plat.y, plat.width, plat.height, 8);
                    ctx.fill();
                } else if (state.phase === 2) {
                    // المرحلة 2: ذهبي وحاد
                    const platGrad = ctx.createLinearGradient(plat.x, plat.y, plat.x, plat.y + plat.height);
                    platGrad.addColorStop(0, '#fde047');
                    platGrad.addColorStop(0.5, '#ca8a04');
                    platGrad.addColorStop(1, '#713f12');
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = plat.type === 'moving' ? '#ef4444' : '#ca8a04';
                    ctx.fillStyle = platGrad;
                    ctx.beginPath();
                    ctx.moveTo(plat.x + 5, plat.y);
                    ctx.lineTo(plat.x + plat.width - 5, plat.y);
                    ctx.lineTo(plat.x + plat.width, plat.y + plat.height);
                    ctx.lineTo(plat.x, plat.y + plat.height);
                    ctx.closePath();
                    ctx.fill();
                } else if (state.phase === 3) {
                    // المرحلة 3: نيون سيان/زهري
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = plat.type === 'moving' ? '#ec4899' : '#06b6d4';
                    ctx.fillStyle = plat.type === 'moving' ? '#db2777' : '#0891b2';
                    ctx.beginPath();
                    ctx.roundRect(plat.x, plat.y, plat.width, plat.height, 4);
                    ctx.fill();
                    // خط نيون داخلي
                    ctx.fillStyle = plat.type === 'moving' ? '#fbcfe8' : '#cffafe';
                    ctx.fillRect(plat.x + 4, plat.y + 4, plat.width - 8, 2);
                } else {
                    // المرحلة 4: جليتش / فراغ (أسود بحواف مضيئة مشتتة)
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = Math.random() > 0.5 ? '#a855f7' : '#ef4444';
                    ctx.fillStyle = '#000000';
                    ctx.strokeStyle = ctx.shadowColor;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.rect(plat.x, plat.y, plat.width, plat.height);
                    ctx.fill();
                    ctx.stroke();
                }
            });

            // رسم اللاعب
            const p = state.player;
            ctx.shadowBlur = 25;
            
            let pColor1, pColor2, shadowColor;
            if (state.phase === 1) { pColor1 = '#e0f2fe'; pColor2 = '#0ea5e9'; shadowColor = '#38bdf8'; }
            else if (state.phase === 2) { pColor1 = '#fef3c7'; pColor2 = '#d97706'; shadowColor = '#fbbf24'; }
            else if (state.phase === 3) { pColor1 = '#fdf4ff'; pColor2 = '#c026d3'; shadowColor = '#e879f9'; }
            else { pColor1 = '#ffffff'; pColor2 = '#4c1d95'; shadowColor = '#ddd6fe'; }
            
            ctx.shadowColor = shadowColor;
            const playerGrad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + p.height);
            playerGrad.addColorStop(0, pColor1);
            playerGrad.addColorStop(1, pColor2);
            ctx.fillStyle = playerGrad;
            
            ctx.beginPath();
            ctx.roundRect(p.x, p.y, p.width, p.height, state.phase === 4 ? 0 : 10); // اللاعب يصبح مربعاً حاداً في المرحلة 4
            ctx.fill();

            // العيون
            ctx.fillStyle = state.phase >= 3 ? '#fff' : '#000';
            ctx.beginPath();
            ctx.arc(p.x + p.width*0.3, p.y + p.height*0.35, p.width*0.1, 0, Math.PI * 2);
            ctx.arc(p.x + p.width*0.7, p.y + p.height*0.35, p.width*0.1, 0, Math.PI * 2);
            ctx.fill();
            
            // اللمعة في المراحل الأولى والثانية فقط
            if (state.phase < 3) {
                ctx.fillStyle = '#fff'; 
                ctx.beginPath();
                ctx.arc(p.x + p.width*0.32, p.y + p.height*0.32, p.width*0.04, 0, Math.PI * 2);
                ctx.arc(p.x + p.width*0.72, p.y + p.height*0.32, p.width*0.04, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            if (!state.gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            state.gameRunning = false;
            if (state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('learnova_jump_best_v3', state.score);
                highScoreEl.innerText = state.score;
            }
            document.getElementById('final-score').innerText = state.score;
            phaseReachedEl.innerText = `وصلت إلى: ${PHASE_NAMES[state.phase]}`;
            gameoverScreen.classList.remove('hidden');
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 200]);
        }

        // التحكم بالكيبورد
        window.addEventListener('keydown', e => { if(state.gameRunning) state.keys[e.code] = true; });
        window.addEventListener('keyup', e => state.keys[e.code] = false);

        // تحسين التحكم باللمس ليناسب الموبايل بشكل دقيق
        canvas.addEventListener('touchstart', e => {
            e.preventDefault(); // منع التمرير (Scrolling) العشوائي
            const rect = canvas.getBoundingClientRect();
            const touchX = e.touches[0].clientX - rect.left;
            
            // تقسيم الـ canvas نفسه لنصفين للتحكم يمين/يسار بدلاً من الشاشة ككل
            if (touchX < canvas.clientWidth / 2) {
                state.keys['ArrowLeft'] = true;
                state.keys['ArrowRight'] = false;
            } else {
                state.keys['ArrowRight'] = true;
                state.keys['ArrowLeft'] = false;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            state.keys['ArrowLeft'] = false;
            state.keys['ArrowRight'] = false;
        }, { passive: false });

        startBtn.onclick = initGame;
        retryBtn.onclick = initGame;

        window.addEventListener('online', () => {
            document.getElementById('status-dot').className = 'w-2.5 h-2.5 rounded-full bg-green-500';
            document.getElementById('status-text').innerText = 'عاد الاتصال!';
        });

        // تهيئة مبدئية قبل بدء اللعب
        resizeCanvas();
        state.player = {
            x: canvas.width / 2 - config.playerSize / 2,
            y: canvas.height - 180,
            width: config.playerSize,
            height: config.playerSize
        };
        state.platforms = [{
            x: state.player.x - 40,
            y: state.player.y + 60,
            width: 160,
            height: config.platformHeight,
            type: 'static'
        }];
        draw(); 
    </script>
</body>
</html>
