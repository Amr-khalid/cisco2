        let questions = [...originalQuestions];
        let currentPage = 0;
        const pageSize = 20;
        let answersState = {}; // Stores user choices { questionGlobalIndex: selectedOptionIndex }

        function renderQuestions() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = '';
            
            const startIdx = currentPage * pageSize;
            const endIdx = Math.min(startIdx + pageSize, questions.length);
            const currentBatch = questions.slice(startIdx, endIdx);

            currentBatch.forEach((item, localIndex) => {
                const globalIndex = startIdx + localIndex;
                const questionDiv = document.createElement('div');
                questionDiv.className = "bg-white p-5 border rounded-xl shadow-sm";
                
                // Question Header
                const qTitle = document.createElement('h3');
                qTitle.className = "text-lg font-bold text-gray-800 mb-4 text-left";
                qTitle.dir = "ltr";
                qTitle.innerText = `Q${globalIndex + 1}: ${item.q}`;
                questionDiv.appendChild(qTitle);

                // Options Container
                const optsDiv = document.createElement('div');
                optsDiv.className = "grid grid-cols-1 gap-3";
                optsDiv.id = `opts-container-${globalIndex}`;

                item.opts.forEach((optText, optIndex) => {
                    const btn = document.createElement('button');
                    btn.className = "option-btn w-full text-left ltr text-gray-700 bg-gray-100 border border-gray-300 rounded-lg p-3 focus:outline-none";
                    btn.dir = "ltr";
                    btn.innerText = `${String.fromCharCode(65 + optIndex)}) ${optText}`;
                    btn.onclick = () => selectAnswer(globalIndex, optIndex, item.ans);
                    
                    // Restore state if already answered
                    if (answersState[globalIndex] !== undefined) {
                        optsDiv.classList.add('disabled-opts');
                        if (optIndex === item.ans) {
                            btn.classList.add('correct-ans');
                        } else if (optIndex === answersState[globalIndex]) {
                            btn.classList.add('wrong-ans');
                        }
                    }

                    optsDiv.appendChild(btn);
                });

                questionDiv.appendChild(optsDiv);
                container.appendChild(questionDiv);
            });

            updateControls();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function selectAnswer(globalIndex, selectedIndex, correctIndex) {
            const optsContainer = document.getElementById(`opts-container-${globalIndex}`);
            
            // Prevent multiple clicks
            if (optsContainer.classList.contains('disabled-opts')) return;
            
            // Save state
            answersState[globalIndex] = selectedIndex;
            optsContainer.classList.add('disabled-opts');

            const buttons = optsContainer.getElementsByTagName('button');
            
            // Highlight answers immediately
            for (let i = 0; i < buttons.length; i++) {
                if (i === correctIndex) {
                    buttons[i].classList.add('correct-ans');
                }
                if (i === selectedIndex && i !== correctIndex) {
                    buttons[i].classList.add('wrong-ans');
                }
            }
        }

        function nextPage() {
            if ((currentPage + 1) * pageSize < questions.length) {
                currentPage++;
                renderQuestions();
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
            }
        }

        function shuffleQuestions() {
            // Shuffle the array
            questions = [...originalQuestions].sort(() => Math.random() - 0.5);
            // Reset pagination and states
            currentPage = 0;
            answersState = {};
            renderQuestions();
        }

        function updateControls() {
            const start = (currentPage * pageSize) + 1;
            const end = Math.min((currentPage + 1) * pageSize, questions.length);
            document.getElementById('progress-info').innerText = `الأسئلة: ${start} - ${end} (من أصل ${questions.length})`;
            
            document.getElementById('prev-btn').disabled = currentPage === 0;
            document.getElementById('next-btn').disabled = end >= questions.length;
        }

        // Initialize App
        renderQuestions();
    </script>
