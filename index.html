        // *** FIX: Wrap all DOM interaction code inside DOMContentLoaded listener ***
        // بدء الاختبار عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 2. جلب عناصر الصفحة ---
            const quizView = document.getElementById('quiz-view');
            const resultsView = document.getElementById('results-view');
            const questionText = document.getElementById('question-text');
            const optionsContainer = document.getElementById('options-container');
            const feedback = document.getElementById('feedback');
            const nextBtn = document.getElementById('next-btn');
            const progressText = document.getElementById('progress');
            
            const scoreText = document.getElementById('score');
            const summaryText = document.getElementById('summary');
            const restartBtn = document.getElementById('restart-btn');

            // --- 3. متغيرات حالة الاختبار ---
            let questions = []; // ستُملأ بنسخة مبعثرة من الأسئلة
            let currentQuestionIndex = 0;
            let score = 0;

            // --- 4. الوظائف الأساسية ---

            /**
             * وظيفة لبدء الاختبار أو إعادة تشغيله
             */
            function startQuiz() {
                // إعادة تعيين
                currentQuestionIndex = 0;
                score = 0;
                
                // خلط الأسئلة
                questions = shuffleArray([...allQuestions]);
                
                // إظهار واجهة الاختبار وإخفاء النتائج
                quizView.classList.remove('hidden');
                resultsView.classList.add('hidden');
                
                // تحميل أول سؤال
                loadQuestion();
            }

            /**
             * وظيفة لتحميل السؤال الحالي وخياراته
             */
            function loadQuestion() {
                // التحقق إذا انتهت الأسئلة
                if (currentQuestionIndex >= questions.length) {
                    showResults();
                    return;
                }

                // إعادة تعيين الواجهة
                feedback.textContent = '';
                nextBtn.classList.add('hidden');
                optionsContainer.innerHTML = '';

                // جلب السؤال الحالي
                const currentQuestion = questions[currentQuestionIndex];

                // عرض نص السؤال والتقدم
                questionText.textContent = currentQuestion.question;
                progressText.textContent = `السؤال ${currentQuestionIndex + 1} / ${questions.length}`;

                // ----> ** التعديل الجديد: خلط ترتيب الخيارات ** <----
                const shuffledOptions = shuffleArray([...currentQuestion.options]);

                // إنشاء أزرار الخيارات (باستخدام الخيارات المخلوطة)
                shuffledOptions.forEach(option => {
                    const button = document.createElement('button');
                    button.textContent = option;
                    button.classList.add('option-btn', 'w-full', 'text-left', 'p-4', 'border-2', 'border-gray-300', 'rounded-lg', 'transition-colors', 'duration-150');
                    
                    // إضافة مستمع الحدث للتحقق من الإجابة
                    button.addEventListener('click', () => {
                        selectAnswer(button, option, currentQuestion.answer);
                    });
                    
                    optionsContainer.appendChild(button);
                });
            }

            /**
             * وظيفة عند اختيار إجابة
             */
            function selectAnswer(selectedButton, selectedOption, correctAnswer) {
                // تعطيل جميع الأزرار
                Array.from(optionsContainer.children).forEach(btn => {
                    btn.disabled = true;
                    // تمييز الإجابة الصحيحة
                    if (btn.textContent === correctAnswer) {
                        btn.classList.add('correct-answer');
                    }
                });

                // التحقق من إجابة المستخدم
                if (selectedOption === correctAnswer) {
                    score++;
                    feedback.textContent = 'إجابة صحيحة!';
                    feedback.classList.add('text-green-600');
                    feedback.classList.remove('text-red-600');
                } else {
                    // تمييز الإجابة الخاطئة (إذا لم تكن هي نفسها الصحيحة)
                    selectedButton.classList.add('incorrect-answer');
                    // ** التعديل: إظهار الإجابة الصحيحة عند الخطأ **
                    feedback.textContent = `إجابة خاطئة. الإجابة الصحيحة هي: "${correctAnswer}"`;
                    feedback.classList.add('text-red-600');
                    feedback.classList.remove('text-green-600');
                }

                // إظهار زر "التالي"
                nextBtn.classList.remove('hidden');
            }

            /**
             * وظيفة لإظهار النتائج النهائية
             */
            function showResults() {
                // إخفاء واجهة الاختبار وإظهار النتائج
                quizView.classList.add('hidden');
                resultsView.classList.remove('hidden');

                const percentage = ((score / questions.length) * 100).toFixed(1);
                scoreText.textContent = `نتيجتك هي: ${score} من ${questions.length} (${percentage}%)`;

                let summary = 'أداء رائع!';
                if (percentage < 50) {
                    summary = 'تحتاج إلى المزيد من المراجعة.';
                } else if (percentage < 80) {
                    summary = 'أداء جيد، استمر!';
                }
                summaryText.textContent = summary;
            }

            /**
             * وظيفة مساعدة لخلط المصفوفة (خوارزمية Fisher-Yates)
             */
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // --- 5. ربط مستمعي الأحداث ---

            // عند النقر على "التالي"
            nextBtn.addEventListener('click', () => {
                currentQuestionIndex++;
                loadQuestion();
            });

            // عند النقر على "إعادة الاختبار"
            restartBtn.addEventListener('click', startQuiz);

            // بدء الاختبار عند تحميل الصفحة
            startQuiz();
        
        }); // <-- End of DOMContentLoaded listener

    </script>

<body class="bg-gray-100 text-gray-800 flex items-center justify-center min-h-screen p-4">

    <!-- حاوية الاختبار الرئيسية -->
    <div class="bg-white rounded-2xl shadow-2xl p-6 md:p-8 w-full max-w-3xl">

        <!-- واجهة الاختبار (تُخفى عند إظهار النتائج) -->
        <div id="quiz-view">
            <!-- معلومات التقدم -->
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold text-blue-700">اختبار الشبكات</h2>
                <div id="progress" class="text-lg font-semibold text-gray-600"></div>
            </div>

            <!-- نص السؤال (محاذاة لليسار لأنه إنجليزي) -->
            <div class="border-t border-b border-gray-200 py-6 mb-6">
                <h3 id="question-text" class="text-xl md:text-2xl font-semibold text-left" dir="ltr">جاري تحميل السؤال...</h3>
            </div>

            <!-- حاوية الخيارات (محاذاة لليسار) -->
            <div id="options-container" class="space-y-3" dir="ltr">
                <!-- أزرار الخيارات تضاف هنا عبر جافاسكربت -->
            </div>

            <!-- رسالة التغذية الراجعة (صحيح/خطأ) -->
            <div id="feedback" class="mt-5 text-lg font-bold text-center"></div>

            <!-- زر "التالي" (يظهر بعد الإجابة) -->
            <button id="next-btn" class="hidden mt-6 w-full bg-blue-600 text-white font-semibold py-3 px-5 rounded-lg text-lg hover:bg-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-50">

        </div>

        <!-- واجهة النتائج (مخفية في البداية) -->

            <p id="summary" class="text-xl text-gray-600 mb-8">...</p>
            <button id="restart-btn" class="w-full bg-green-600 text-white font-semibold py-3 px-5 rounded-lg text-lg hover:bg-green-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50">
                إعادة الاختبار
            </button>
        </div>

    </div>

</body>
